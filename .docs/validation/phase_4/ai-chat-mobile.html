<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>Phase 4 Validation - AI Chat Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #1a1a2e; width: 375px; margin: 0 auto; }
  .page { display: flex; flex-direction: column; height: 100vh; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #e0e0e0; background: #fafafa; }
  .header h3 { font-size: 16px; font-weight: 600; }
  .menu-btn { padding: 6px 10px; background: #5b4dc7; color: #fff; border: none; border-radius: 6px; font-size: 12px; }
  .messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 8px; max-width: 90%; font-size: 13px; line-height: 1.5; }
  .msg-user { align-self: flex-end; background: #e8e4ff; }
  .msg-assistant { align-self: flex-start; background: #f5f5f5; }
  .msg-role { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #888; margin-bottom: 3px; }
  .tool-call { margin: 6px 0; border: 1px solid #e0e0e0; border-radius: 4px; padding: 6px 8px; background: #fafafa; font-size: 11px; }
  .tool-header { display: flex; align-items: center; gap: 6px; }
  .tool-name { font-weight: 600; font-size: 12px; }
  .tool-status { margin-left: auto; font-size: 11px; color: #16a34a; }
  .input-bar { padding: 10px 12px; border-top: 1px solid #e0e0e0; display: flex; gap: 6px; }
  .chat-input { flex: 1; padding: 8px 10px; border: 1px solid #d0d0d0; border-radius: 8px; font-size: 13px; }
  .send-btn { padding: 8px 14px; background: #5b4dc7; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .badge { position: fixed; top: 4px; right: 4px; background: #333; color: #fff; padding: 3px 8px; border-radius: 4px; font-size: 10px; z-index: 10; }
</style>
</head>
<body>
  <div class="badge">VALIDATION: Mobile (375px)</div>
  <div class="page">
    <div class="header">
      <button class="menu-btn">Sessions</button>
      <h3>AI Chat</h3>
      <button class="menu-btn">Ctx</button>
    </div>
    <div class="messages">
      <div class="msg msg-user">
        <div class="msg-role">You</div>
        Add a dark mode toggle idea
      </div>
      <div class="msg msg-assistant">
        <div class="msg-role">AI</div>
        <div class="tool-call">
          <div class="tool-header">
            <span style="font-weight:bold;">&#10003;</span>
            <span class="tool-name">Add Idea</span>
            <span class="tool-status">Done</span>
          </div>
        </div>
        Idea added to project proj-123.
      </div>
      <div class="msg msg-user">
        <div class="msg-role">You</div>
        Add kanban card for it
      </div>
      <div class="msg msg-assistant">
        <div class="msg-role">AI</div>
        <div class="tool-call">
          <div class="tool-header">
            <span style="font-weight:bold;">&#10003;</span>
            <span class="tool-name">Update Kanban</span>
            <span class="tool-status">Done</span>
          </div>
        </div>
        Card added to "To Do" column.
      </div>
    </div>
    <div class="input-bar">
      <input class="chat-input" placeholder="Ask AI...">
      <button class="send-btn">Go</button>
    </div>
  </div>
</body>
</html>
