<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring Meadow — Nature Landscape Pass 2</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ===== HEADER BAR ===== -->
  <header class="header-bar">
    <span class="badge badge--domain">ANIMATION</span>
    <h1 class="header-title">Nature Landscape &mdash; Pass 2</h1>
    <span class="badge badge--lib">GSAP</span>
  </header>

  <!-- ===== MAIN SHOWCASE ===== -->
  <main class="showcase">
    <div class="frame">
      <div class="scene" id="scene">

        <!-- SKY LAYER (back) -->
        <div class="layer layer--sky" id="layerSky">
          <div class="sky-gradient"></div>

          <!-- Sun -->
          <div class="sun" id="sun">
            <div class="sun-core"></div>
            <div class="sun-glow"></div>
          </div>

          <!-- Clouds -->
          <svg class="cloud cloud--1" id="cloud1" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="70" cy="50" rx="60" ry="25" fill="rgba(255,255,255,0.9)"/>
            <ellipse cx="110" cy="40" rx="50" ry="30" fill="rgba(255,255,255,0.95)"/>
            <ellipse cx="50" cy="45" rx="40" ry="20" fill="rgba(255,255,255,0.85)"/>
            <ellipse cx="130" cy="50" rx="35" ry="18" fill="rgba(255,255,255,0.88)"/>
          </svg>

          <svg class="cloud cloud--2" id="cloud2" viewBox="0 0 180 70" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="40" rx="50" ry="22" fill="rgba(255,255,255,0.85)"/>
            <ellipse cx="100" cy="35" rx="45" ry="25" fill="rgba(255,255,255,0.9)"/>
            <ellipse cx="140" cy="42" rx="35" ry="18" fill="rgba(255,255,255,0.82)"/>
          </svg>

          <svg class="cloud cloud--3" id="cloud3" viewBox="0 0 160 60" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="50" cy="35" rx="40" ry="20" fill="rgba(255,255,255,0.8)"/>
            <ellipse cx="90" cy="30" rx="45" ry="22" fill="rgba(255,255,255,0.88)"/>
            <ellipse cx="120" cy="38" rx="30" ry="15" fill="rgba(255,255,255,0.78)"/>
          </svg>

          <svg class="cloud cloud--4" id="cloud4" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="80" cy="45" rx="55" ry="25" fill="rgba(255,255,255,0.75)"/>
            <ellipse cx="130" cy="38" rx="50" ry="28" fill="rgba(255,255,255,0.82)"/>
            <ellipse cx="170" cy="48" rx="38" ry="20" fill="rgba(255,255,255,0.72)"/>
            <ellipse cx="50" cy="50" rx="35" ry="16" fill="rgba(255,255,255,0.7)"/>
          </svg>

          <svg class="cloud cloud--5" id="cloud5" viewBox="0 0 140 55" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="45" cy="32" rx="35" ry="18" fill="rgba(255,255,255,0.78)"/>
            <ellipse cx="80" cy="28" rx="40" ry="20" fill="rgba(255,255,255,0.85)"/>
            <ellipse cx="110" cy="35" rx="28" ry="14" fill="rgba(255,255,255,0.75)"/>
          </svg>

          <!-- Birds in V-formation -->
          <svg class="bird-flock" id="birdFlock1" viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 20 Q15 12 20 20" stroke="#334155" stroke-width="2" fill="none"/>
            <path d="M25 15 Q30 7 35 15" stroke="#334155" stroke-width="2" fill="none"/>
            <path d="M25 25 Q30 17 35 25" stroke="#334155" stroke-width="1.5" fill="none"/>
            <path d="M40 10 Q45 3 50 10" stroke="#334155" stroke-width="1.5" fill="none"/>
            <path d="M40 30 Q45 23 50 30" stroke="#334155" stroke-width="1.5" fill="none"/>
          </svg>

          <svg class="bird-flock" id="birdFlock2" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 15 Q12 9 16 15" stroke="#475569" stroke-width="1.5" fill="none"/>
            <path d="M20 10 Q24 4 28 10" stroke="#475569" stroke-width="1.5" fill="none"/>
            <path d="M20 20 Q24 14 28 20" stroke="#475569" stroke-width="1.5" fill="none"/>
          </svg>
        </div>

        <!-- HILLS LAYER (mid) -->
        <div class="layer layer--hills" id="layerHills">
          <!-- Back hill (darker) -->
          <div class="hill hill--back"></div>
          <!-- Mid hill -->
          <div class="hill hill--mid"></div>
          <!-- Front hill (lighter) -->
          <div class="hill hill--front"></div>

          <!-- Wildflowers on hills -->
          <div class="wildflowers" id="wildflowers">
            <!-- Generated via JS -->
          </div>
        </div>

        <!-- FRONT LAYER (grass + butterflies + petals) -->
        <div class="layer layer--front" id="layerFront">
          <!-- Grass blades container -->
          <div class="grass-bed" id="grassBed">
            <!-- Generated via JS -->
          </div>

          <!-- Butterflies -->
          <svg class="butterfly" id="butterfly1" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <g class="butterfly-body">
              <ellipse cx="20" cy="15" rx="2" ry="6" fill="#4B5563"/>
              <circle cx="20" cy="8" r="2.5" fill="#4B5563"/>
              <line x1="18" y1="6" x2="15" y2="2" stroke="#4B5563" stroke-width="1"/>
              <line x1="22" y1="6" x2="25" y2="2" stroke="#4B5563" stroke-width="1"/>
              <circle cx="15" cy="2" r="1" fill="#4B5563"/>
              <circle cx="25" cy="2" r="1" fill="#4B5563"/>
            </g>
            <g class="wing wing--left" transform-origin="20 15">
              <ellipse cx="12" cy="11" rx="10" ry="7" fill="#F9A8D4" opacity="0.85"/>
              <ellipse cx="13" cy="18" rx="7" ry="5" fill="#FBCFE8" opacity="0.8"/>
            </g>
            <g class="wing wing--right" transform-origin="20 15">
              <ellipse cx="28" cy="11" rx="10" ry="7" fill="#F9A8D4" opacity="0.85"/>
              <ellipse cx="27" cy="18" rx="7" ry="5" fill="#FBCFE8" opacity="0.8"/>
            </g>
          </svg>

          <svg class="butterfly" id="butterfly2" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <g class="butterfly-body">
              <ellipse cx="20" cy="15" rx="2" ry="6" fill="#4B5563"/>
              <circle cx="20" cy="8" r="2.5" fill="#4B5563"/>
              <line x1="18" y1="6" x2="15" y2="2" stroke="#4B5563" stroke-width="1"/>
              <line x1="22" y1="6" x2="25" y2="2" stroke="#4B5563" stroke-width="1"/>
              <circle cx="15" cy="2" r="1" fill="#4B5563"/>
              <circle cx="25" cy="2" r="1" fill="#4B5563"/>
            </g>
            <g class="wing wing--left" transform-origin="20 15">
              <ellipse cx="12" cy="11" rx="10" ry="7" fill="#FDE68A" opacity="0.85"/>
              <ellipse cx="13" cy="18" rx="7" ry="5" fill="#FEF3C7" opacity="0.8"/>
            </g>
            <g class="wing wing--right" transform-origin="20 15">
              <ellipse cx="28" cy="11" rx="10" ry="7" fill="#FDE68A" opacity="0.85"/>
              <ellipse cx="27" cy="18" rx="7" ry="5" fill="#FEF3C7" opacity="0.8"/>
            </g>
          </svg>

          <svg class="butterfly" id="butterfly3" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <g class="butterfly-body">
              <ellipse cx="20" cy="15" rx="2" ry="6" fill="#4B5563"/>
              <circle cx="20" cy="8" r="2.5" fill="#4B5563"/>
              <line x1="18" y1="6" x2="15" y2="2" stroke="#4B5563" stroke-width="1"/>
              <line x1="22" y1="6" x2="25" y2="2" stroke="#4B5563" stroke-width="1"/>
              <circle cx="15" cy="2" r="1" fill="#4B5563"/>
              <circle cx="25" cy="2" r="1" fill="#4B5563"/>
            </g>
            <g class="wing wing--left" transform-origin="20 15">
              <ellipse cx="12" cy="11" rx="10" ry="7" fill="#93C5FD" opacity="0.85"/>
              <ellipse cx="13" cy="18" rx="7" ry="5" fill="#BFDBFE" opacity="0.8"/>
            </g>
            <g class="wing wing--right" transform-origin="20 15">
              <ellipse cx="28" cy="11" rx="10" ry="7" fill="#93C5FD" opacity="0.85"/>
              <ellipse cx="27" cy="18" rx="7" ry="5" fill="#BFDBFE" opacity="0.8"/>
            </g>
          </svg>

          <svg class="butterfly" id="butterfly4" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <g class="butterfly-body">
              <ellipse cx="20" cy="15" rx="2" ry="6" fill="#4B5563"/>
              <circle cx="20" cy="8" r="2.5" fill="#4B5563"/>
              <line x1="18" y1="6" x2="15" y2="2" stroke="#4B5563" stroke-width="1"/>
              <line x1="22" y1="6" x2="25" y2="2" stroke="#4B5563" stroke-width="1"/>
              <circle cx="15" cy="2" r="1" fill="#4B5563"/>
              <circle cx="25" cy="2" r="1" fill="#4B5563"/>
            </g>
            <g class="wing wing--left" transform-origin="20 15">
              <ellipse cx="12" cy="11" rx="10" ry="7" fill="#A78BFA" opacity="0.85"/>
              <ellipse cx="13" cy="18" rx="7" ry="5" fill="#C4B5FD" opacity="0.8"/>
            </g>
            <g class="wing wing--right" transform-origin="20 15">
              <ellipse cx="28" cy="11" rx="10" ry="7" fill="#A78BFA" opacity="0.85"/>
              <ellipse cx="27" cy="18" rx="7" ry="5" fill="#C4B5FD" opacity="0.8"/>
            </g>
          </svg>

          <svg class="butterfly" id="butterfly5" viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
            <g class="butterfly-body">
              <ellipse cx="20" cy="15" rx="2" ry="6" fill="#4B5563"/>
              <circle cx="20" cy="8" r="2.5" fill="#4B5563"/>
              <line x1="18" y1="6" x2="15" y2="2" stroke="#4B5563" stroke-width="1"/>
              <line x1="22" y1="6" x2="25" y2="2" stroke="#4B5563" stroke-width="1"/>
              <circle cx="15" cy="2" r="1" fill="#4B5563"/>
              <circle cx="25" cy="2" r="1" fill="#4B5563"/>
            </g>
            <g class="wing wing--left" transform-origin="20 15">
              <ellipse cx="12" cy="11" rx="10" ry="7" fill="#6EE7B7" opacity="0.85"/>
              <ellipse cx="13" cy="18" rx="7" ry="5" fill="#A7F3D0" opacity="0.8"/>
            </g>
            <g class="wing wing--right" transform-origin="20 15">
              <ellipse cx="28" cy="11" rx="10" ry="7" fill="#6EE7B7" opacity="0.85"/>
              <ellipse cx="27" cy="18" rx="7" ry="5" fill="#A7F3D0" opacity="0.8"/>
            </g>
          </svg>

          <!-- Drifting petals container -->
          <div class="petals" id="petals">
            <!-- Generated via JS -->
          </div>
        </div>

      </div><!-- /.scene -->
    </div><!-- /.frame -->
  </main>

  <!-- ===== CONTROLS PANEL ===== -->
  <section class="controls" id="controls">
    <div class="control-group">
      <button class="btn btn--play-pause" id="btnPlayPause" aria-label="Pause animation">
        <svg class="icon icon--pause" id="iconPause" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <rect x="6" y="4" width="4" height="16" rx="1"/>
          <rect x="14" y="4" width="4" height="16" rx="1"/>
        </svg>
        <svg class="icon icon--play hidden" id="iconPlay" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <polygon points="6,4 20,12 6,20"/>
        </svg>
        <span id="btnLabel">Pause</span>
      </button>
    </div>

    <div class="control-group">
      <label class="control-label" for="windSlider">Wind Intensity</label>
      <input type="range" id="windSlider" class="slider" min="0" max="100" value="50" />
      <span class="slider-value" id="windValue">50%</span>
    </div>

    <div class="control-group">
      <label class="control-label">Time of Day</label>
      <button class="btn btn--toggle" id="btnDayDusk">
        <span class="toggle-track" id="toggleTrack">
          <span class="toggle-thumb" id="toggleThumb"></span>
        </span>
        <span id="timeLabel">Day</span>
      </button>
    </div>
  </section>

  <!-- ===== INFO FOOTER ===== -->
  <footer class="info-footer">
    <span>GSAP v3.12.5 + MotionPathPlugin</span>
    <span class="sep">|</span>
    <span>DOM/SVG Rendering</span>
    <span class="sep">|</span>
    <span>Animated Spring Meadow</span>
  </footer>

  <!-- GSAP CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
